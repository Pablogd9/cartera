name: Actualizar cartera

on:
  schedule:
    - cron: "10 6 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "portfolio.json"

permissions:
  contents: write

concurrency:
  group: actualizar-cartera
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ejecutar el motor
        run: python scripts/update.py
      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/output.json
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar."
          else
            git commit -m "Actualizacion automatica de datos ($(date -u +%Y-%m-%d))"
            git push
          fi
